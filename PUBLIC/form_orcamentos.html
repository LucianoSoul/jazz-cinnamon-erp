<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emissão de Contrato - Jazz Cinnamon</title>
    
    <!-- TAGS APP MOBILE MODE -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Jazz ERP">

    <link rel="apple-touch-icon" href="https://firebasestorage.googleapis.com/v0/b/jazz-cinnamon-erp.firebasestorage.app/o/BOTAO%20ERP.png?alt=media">
    <link rel="icon" type="image/png" href="https://firebasestorage.googleapis.com/v0/b/jazz-cinnamon-erp.firebasestorage.app/o/BOTAO%20ERP.png?alt=media">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background: #fcfaf7; color: #1a1a1a; }
        .input-jazz { border: none; border-bottom: 1px solid #ccc; background: transparent; padding: 10px 0; width: 100%; outline: none; transition: 0.3s; font-size: 0.875rem; }
        .input-jazz:focus { border-bottom-color: #c5a059; }
        .input-jazz:disabled, .input-jazz[readonly] { color: #9ca3af; border-bottom-color: #e5e7eb; background: #f9fafb; cursor: not-allowed; padding-left: 8px; border-radius: 4px; }
        .loader { width: 20px; height: 20px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        .seccao-oculta { opacity: 0; max-height: 0; overflow: hidden; transition: all 0.5s ease-in-out; }
        .seccao-visivel { opacity: 1; max-height: 2500px; overflow: visible; margin-top: 1.5rem; }
        
        /* Transição suave para mudança de texto de status */
        #status-data { transition: color 0.3s ease; }
        .status-apresentacao { transition: color 0.3s ease; }
        .card-apresentacao { border: 1px solid #ece7dd; border-radius: 16px; padding: 16px; background: #fffdf9; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-start p-4">
    <div class="bg-white w-full max-w-2xl p-8 md:p-12 shadow-2xl rounded-sm border-t-4 border-[#c5a059] mt-10 mb-10 relative">
        
        <header class="text-center mb-10 flex flex-col items-center">
            <div class="flex items-center justify-center gap-8 mb-6">
                <img src="https://firebasestorage.googleapis.com/v0/b/jazz-cinnamon-erp.firebasestorage.app/o/OJNDCD-10%20(1).png?alt=media" alt="O Jazz Nosso De Cada Dia" class="h-20 object-contain">
                <img src="https://firebasestorage.googleapis.com/v0/b/jazz-cinnamon-erp.firebasestorage.app/o/logo%20preto%20(2).png?alt=media" alt="Jazz Cinnamon Logo" class="h-20 object-contain">
            </div>
            
            <h1 class="font-serif text-3xl mb-2 uppercase" style="font-family: 'Playfair Display', serif;">Orçamento Jazz Cinnamon</h1>
            <p class="text-[10px] uppercase tracking-[0.3em] text-gray-400">Solicitação de Data e Reserva</p>
        </header>

        <form id="formCliente" class="space-y-6" autocomplete="off">
            
            <!-- SELEÇÃO DE CPF / CNPJ -->
            <div>
                <div class="flex gap-6 mb-2">
                    <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-gray-500 uppercase tracking-widest hover:text-[#c5a059] transition">
                        <input type="radio" name="tipo_doc" value="CPF" checked class="accent-[#c5a059] w-4 h-4" onchange="window.mudarTipoDoc()"> CPF
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer text-xs font-bold text-gray-500 uppercase tracking-widest hover:text-[#c5a059] transition">
                        <input type="radio" name="tipo_doc" value="CNPJ" class="accent-[#c5a059] w-4 h-4" onchange="window.mudarTipoDoc()"> CNPJ
                    </label>
                </div>
                <div class="relative">
                    <!-- Adicionado oninput para aplicar a máscara na hora da digitação -->
                    <input type="text" id="documento" placeholder="000.000.000-00" required class="input-jazz" oninput="window.formatarCpfCnpj(this)" onblur="window.triggerBusca(this.value)">
                    <span id="txt-buscando" class="absolute right-0 top-3 text-[8px] font-bold text-amber-600 hidden animate-pulse">PROCURANDO...</span>
                </div>
            </div>

            <input type="text" id="nome_razao" placeholder="Nome Completo ou Razão Social" required class="input-jazz uppercase">
            
            <div class="grid grid-cols-2 gap-4">
                <input type="tel" id="whatsapp" placeholder="WhatsApp" required class="input-jazz">
                <input type="email" id="email" placeholder="E-mail" required class="input-jazz">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- LISTA DE EVENTOS ATUALIZADA -->
                <select id="tipo_evento" required class="input-jazz uppercase text-sm" onchange="window.atualizarVisibilidadeApresentacoesMultiplas(); window.triggerVerificacao()">
                    <option value="" disabled selected>Tipo de Evento...</option>
                    <option value="ANIVERSÃRIO">AniversÃ¡rio</option>
                    <option value="CORPORATIVO">Corporativo</option>
                    <option value="CASAMENTO">Casamento</option>
                    <option value="BODAS">Bodas</option>
                    <option value="JANTAR">Jantar</option>
                    <option value="FESTIVAL">Festival</option>
                    <option value="FEIRA">Feira</option>
                    <option value="OUTROS">Outros</option>
                </select>
                <input type="number" id="convidados" placeholder="Qtd Convidados" required class="input-jazz text-sm">
            </div>

            <div id="multi-apresentacoes-wrap" class="hidden bg-[#f8f5ee] border border-[#e7dcc7] rounded-2xl p-4 space-y-3">
                <div>
                    <label class="text-[10px] uppercase font-bold text-[#8b6c33] tracking-[0.18em] block mb-2">Quantas Apresentacoes?</label>
                    <select id="qtd_apresentacoes" class="input-jazz text-sm" onchange="window.renderizarCamposApresentacoesExtras(); window.triggerVerificacao()">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>
                <div class="space-y-1 text-[11px] text-gray-600 leading-relaxed">
                    <p>* Havendo disponibilidade, voce pode solicitar dois shows no mesmo dia em horarios diferentes.</p>
                    <p>* Voce pode escolher ate 5 datas para o seu evento.</p>
                </div>
            </div>

            <div class="card-apresentacao">
                <div class="text-[10px] uppercase font-bold text-[#8b6c33] tracking-[0.18em] mb-3">Apresentacao 1</div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div><label class="text-[9px] uppercase font-bold text-gray-400">Data</label><input type="date" id="data_evento" value="" required class="input-jazz text-sm" onchange="window.triggerVerificacaoApresentacao(1)"></div>
                <div><label class="text-[9px] uppercase font-bold text-gray-400">Horario</label><input type="time" id="hora_inicio" required class="input-jazz text-sm" onchange="window.triggerVerificacaoApresentacao(1)"></div>
                <div><label class="text-[9px] uppercase font-bold text-gray-400">Duracao</label><select id="duracao" class="input-jazz text-sm" onchange="window.triggerVerificacaoApresentacao(1)"><option value="1:00">1h</option><option value="1:30" selected>1,5h</option><option value="2:00">2h</option><option value="2:30">2,5h</option><option value="3:00">3h</option></select></div>
            </div>

            <!-- STATUS DINÂMICO E AUTO-EXPLICATIVO POSICIONADO ESTRATEGICAMENTE AQUI -->
            <span id="status-data" class="status-apresentacao text-[10px] font-bold flex items-center justify-center min-h-[3rem] uppercase border border-dashed border-gray-200 p-2 rounded text-center mt-4"></span>
            </div>

            <div id="apresentacoes-extra-wrap" class="space-y-4 hidden"></div>

            <div class="grid grid-cols-2 gap-4">
                <select id="estado" required class="input-jazz" onchange="window.carregarCidades()">
                    <option value="" disabled selected>UF</option>
                    <option value="RS">RS</option><option value="SC">SC</option><option value="PR">PR</option><option value="SP">SP</option>
                </select>
                <select id="cidade" required class="input-jazz" onchange="window.triggerVerificacao()">
                    <option value="" disabled selected>Selecione a UF primeiro...</option>
                </select>
            </div>

            <input type="text" id="local_nome" placeholder="Nome do Local (Buffet, Quinta, etc)" required class="input-jazz uppercase">
            
            <div class="hidden">
                <!-- LISTA DE EVENTOS ATUALIZADA -->
                <select id="tipo_evento_legado" class="input-jazz uppercase text-sm">
                    <option value="" disabled selected>Tipo de Evento...</option>
                    <option value="ANIVERSÁRIO">Aniversário</option>
                    <option value="CORPORATIVO">Corporativo</option>
                    <option value="CASAMENTO">Casamento</option>
                    <option value="BODAS">Bodas</option>
                    <option value="JANTAR">Jantar</option>
                    <option value="FESTIVAL">Festival</option>
                    <option value="OUTROS">Outros</option>
                </select>
                <input type="number" id="convidados_legado" placeholder="Qtd Convidados" class="input-jazz text-sm">
            </div>

            <button type="submit" id="btnEnviar" class="w-full bg-black text-white py-4 rounded font-bold uppercase text-xs tracking-widest hover:bg-[#c5a059] transition flex justify-center items-center gap-2">
                <span>Enviar Solicitação</span>
                <div id="btn-spinner" class="loader hidden"></div>
            </button>
        </form>

        <div id="sucesso-cliente" class="hidden text-center py-10">
            <div class="text-5xl text-green-500 mb-4">✓</div>
            <h2 class="text-xl font-bold">Solicitação Enviada!</h2>
        </div>
    </div>

    <!-- SCRIPT FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, writeBatch, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyBoQvjJ_j_OO6uNbW0ar-rzRiiMR2Xe8m4", authDomain: "jazz-cinnamon-erp.firebaseapp.com", projectId: "jazz-cinnamon-erp", storageBucket: "jazz-cinnamon-erp.firebasestorage.app", messagingSenderId: "359043770756", appId: "1:359043770756:web:a5a4eec50e6e40f0ebd5d1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const LINK_API = `https://southamerica-east1-${firebaseConfig.projectId}.cloudfunctions.net/linkPublico`;
        const AGENDA_API = `https://southamerica-east1-${firebaseConfig.projectId}.cloudfunctions.net/agendaApi`;

        window.estadoAgenda = "LIVRE";
        window.concorrentesEncontrados = [];
        window.statusTimeout = null;
        window.statusTimeouts = {};
        window.concorrentesPorApresentacao = [];
        window.estadoAgendaPorApresentacao = [];
        window.TIPOS_EVENTO_MULTIAPRESENTACAO = new Set(["FESTIVAL", "CORPORATIVO", "FEIRA"]);
        window.escapeHtml = (s) => String(s || '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));

        window.calcularHoraTerminoFormulario = (inicio, duracao) => {
            if(!inicio) return "";
            const [hora, minuto] = String(inicio).split(':').map(Number);
            const [durHora, durMin] = String(duracao || '1:30').split(':').map(Number);
            const total = ((hora || 0) * 60) + (minuto || 0) + ((durHora || 0) * 60) + (durMin || 0);
            const horaFinal = Math.floor(total / 60) % 24;
            const minutoFinal = total % 60;
            return `${String(horaFinal).padStart(2, '0')}:${String(minutoFinal).padStart(2, '0')}`;
        };

        window.dataInputParaDataStr = (dataInput) => {
            const partes = String(dataInput || '').split('-');
            if(partes.length !== 3) return '';
            return `${partes[2]}-${partes[1]}-${partes[0]}`;
        };

        window.tipoAtualPermiteMultiplasApresentacoes = () => {
            const tipo = String(document.getElementById('tipo_evento')?.value || '').toUpperCase();
            return window.TIPOS_EVENTO_MULTIAPRESENTACAO.has(tipo);
        };

        window.totalApresentacoesSolicitadas = () => {
            const total = parseInt(document.getElementById('qtd_apresentacoes')?.value || '1', 10);
            return Math.max(1, Math.min(5, Number.isFinite(total) ? total : 1));
        };

        window.criarHtmlBlocoApresentacaoExtra = (indice, valores = {}) => `
            <div class="card-apresentacao" data-apresentacao-indice="${indice}">
                <div class="text-[10px] uppercase font-bold text-[#8b6c33] tracking-[0.18em] mb-3">Apresentacao ${indice}</div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="text-[9px] uppercase font-bold text-gray-400">Data</label>
                        <input type="date" class="input-jazz text-sm js-apresentacao-data" value="${window.escapeHtml(valores.data || '')}" onchange="window.triggerVerificacaoApresentacao(${indice})">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-bold text-gray-400">Horario</label>
                        <input type="time" class="input-jazz text-sm js-apresentacao-hora" value="${window.escapeHtml(valores.hora || '')}" onchange="window.triggerVerificacaoApresentacao(${indice})">
                    </div>
                    <div>
                        <label class="text-[9px] uppercase font-bold text-gray-400">Duracao</label>
                        <select class="input-jazz text-sm js-apresentacao-duracao" onchange="window.triggerVerificacaoApresentacao(${indice})">
                            <option value="1:00" ${valores.duracao === '1:00' ? 'selected' : ''}>1h</option>
                            <option value="1:30" ${(valores.duracao || '1:30') === '1:30' ? 'selected' : ''}>1,5h</option>
                            <option value="2:00" ${valores.duracao === '2:00' ? 'selected' : ''}>2h</option>
                            <option value="2:30" ${valores.duracao === '2:30' ? 'selected' : ''}>2,5h</option>
                            <option value="3:00" ${valores.duracao === '3:00' ? 'selected' : ''}>3h</option>
                        </select>
                    </div>
                </div>
                <span id="status-data-${indice}" class="status-apresentacao text-[10px] font-bold flex items-center justify-center min-h-[3rem] uppercase border border-dashed border-gray-200 p-2 rounded text-center mt-4"></span>
            </div>
        `;

        window.obterBlocosApresentacaoFormulario = () => {
            const blocos = [{
                indice: 1,
                dataEl: document.getElementById('data_evento'),
                horaEl: document.getElementById('hora_inicio'),
                duracaoEl: document.getElementById('duracao'),
                statusEl: document.getElementById('status-data')
            }];

            document.querySelectorAll('#apresentacoes-extra-wrap [data-apresentacao-indice]').forEach((card) => {
                blocos.push({
                    indice: parseInt(card.dataset.apresentacaoIndice || '0', 10),
                    dataEl: card.querySelector('.js-apresentacao-data'),
                    horaEl: card.querySelector('.js-apresentacao-hora'),
                    duracaoEl: card.querySelector('.js-apresentacao-duracao'),
                    statusEl: card.querySelector('.status-apresentacao')
                });
            });

            return blocos.sort((a, b) => a.indice - b.indice);
        };

        window.setStatusStepParaElemento = (elemento, textoInicial, textoSecundario, cor, delayMs = 2000) => {
            const label = typeof elemento === 'string' ? document.getElementById(elemento) : elemento;
            if(!label) return;
            const chave = label.id || `status-${Math.random()}`;
            if(window.statusTimeouts[chave]) clearTimeout(window.statusTimeouts[chave]);

            label.innerText = textoInicial;
            label.style.color = cor;

            if (textoSecundario) {
                window.statusTimeouts[chave] = setTimeout(() => {
                    label.innerText = textoSecundario;
                    label.classList.add('animate-pulse');
                    setTimeout(() => label.classList.remove('animate-pulse'), 1200);
                }, delayMs);
            }
        };

        window.definirStatusInicialApresentacao = (statusEl, indice = 1) => {
            if(!statusEl) return;
            const texto = indice === 1
                ? 'PREENCHA A DATA PARA CONSULTAR A DISPONIBILIDADE'
                : `PREENCHA A DATA DA APRESENTACAO ${indice}`;
            window.setStatusStepParaElemento(statusEl, texto, null, '#9ca3af');
        };

        window.obterCidadeFormulario = () => {
            const cidadeSelect = document.getElementById('cidade');
            return (cidadeSelect?.options?.[cidadeSelect.selectedIndex]?.value || '').toUpperCase();
        };

        window.obterEstadoFormulario = () => String(document.getElementById('estado')?.value || '').toUpperCase();

        window.obterValoresApresentacoesExistentes = () => {
            const valores = {};
            window.obterBlocosApresentacaoFormulario().forEach((bloco) => {
                valores[bloco.indice] = {
                    data: bloco.dataEl?.value || '',
                    hora: bloco.horaEl?.value || '',
                    duracao: bloco.duracaoEl?.value || '1:30'
                };
            });
            return valores;
        };

        window.renderizarCamposApresentacoesExtras = () => {
            const wrap = document.getElementById('apresentacoes-extra-wrap');
            if(!wrap) return;

            const valores = window.obterValoresApresentacoesExistentes();
            const permitir = window.tipoAtualPermiteMultiplasApresentacoes();
            const total = permitir ? window.totalApresentacoesSolicitadas() : 1;

            if (!permitir || total <= 1) {
                wrap.innerHTML = '';
                wrap.classList.add('hidden');
                window.concorrentesPorApresentacao = window.concorrentesPorApresentacao.slice(0, 1);
                window.estadoAgendaPorApresentacao = window.estadoAgendaPorApresentacao.slice(0, 1);
                return;
            }

            let html = '';
            for (let indice = 2; indice <= total; indice += 1) {
                html += window.criarHtmlBlocoApresentacaoExtra(indice, valores[indice] || {});
            }
            wrap.innerHTML = html;
            wrap.classList.remove('hidden');

            window.obterBlocosApresentacaoFormulario().forEach((bloco) => {
                if (!String(bloco.statusEl?.innerText || '').trim()) {
                    window.definirStatusInicialApresentacao(bloco.statusEl, bloco.indice);
                }
            });
        };

        window.atualizarVisibilidadeApresentacoesMultiplas = () => {
            const wrap = document.getElementById('multi-apresentacoes-wrap');
            const qtdEl = document.getElementById('qtd_apresentacoes');
            const permitir = window.tipoAtualPermiteMultiplasApresentacoes();
            if (wrap) wrap.classList.toggle('hidden', !permitir);
            if (!permitir && qtdEl) qtdEl.value = '1';
            window.renderizarCamposApresentacoesExtras();
        };

        // SUBSTITUIÇÃO 1: Evita bloqueios de carregamento no Deploy garantindo a exibição inicial
        setTimeout(() => {
            document.getElementById('data_evento').value = '';
            document.getElementById('status-data').innerText = '👉 PREENCHA A DATA PARA CONSULTAR A DISPONIBILIDADE';
            document.getElementById('status-data').style.color = '#9ca3af';
            if(window.lucide) window.lucide.createIcons();
        }, 100);

        // 1. MUDAR PLACEHOLDER QUANDO TROCA DE CPF PARA CNPJ
        window.mudarTipoDoc = () => {
            const tipo = document.querySelector('input[name="tipo_doc"]:checked').value;
            const inputDoc = document.getElementById('documento');
            inputDoc.value = ''; // Limpa o campo ao trocar para não quebrar a máscara
            inputDoc.placeholder = tipo === 'CPF' ? '000.000.000-00' : '00.000.000/0000-00';
            document.getElementById('txt-buscando').classList.add('hidden');
        };

        // 2. MÁSCARA FORTE E DINÂMICA
        window.formatarCpfCnpj = (i) => {
            const tipo = document.querySelector('input[name="tipo_doc"]:checked').value;
            let v = i.value.replace(/\D/g, ""); // Remove tudo o que não é dígito

            if (tipo === 'CPF') {
                if (v.length > 11) v = v.substring(0, 11);
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d)/, "$1.$2");
                v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            } else {
                // CNPJ
                if (v.length > 14) v = v.substring(0, 14);
                v = v.replace(/^(\d{2})(\d)/, "$1.$2");
                v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
                v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
                v = v.replace(/(\d{4})(\d)/, "$1-$2");
            }
            i.value = v;
        };

        window.carregarCidades = async () => {
            const uf = document.getElementById('estado').value;
            const cidadeSelect = document.getElementById('cidade');
            if (!uf) return;
            cidadeSelect.innerHTML = '<option value="" disabled selected>Carregando...</option>';
            try {
                const res = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const cidades = await res.json();
                cidadeSelect.innerHTML = '<option value="" disabled selected>Selecione o Município</option>';
                cidades.forEach(c => cidadeSelect.innerHTML += `<option value="${c.nome.toUpperCase()}">${c.nome.toUpperCase()}</option>`);
            } catch(e) { cidadeSelect.innerHTML = '<option value="" disabled selected>Erro ao carregar</option>'; }
        };

        // 3. BUSCA OTIMIZADA PARA CPF OU CNPJ COMPLETO
        window.triggerBusca = async (docVal) => {
            const docLimpo = docVal.replace(/\D/g, "");
            const tipo = document.querySelector('input[name="tipo_doc"]:checked').value;
            const buscando = document.getElementById('txt-buscando');
            
            // Só dispara a busca se tiver o tamanho exato, economizando requisições
            if (tipo === 'CPF' && docLimpo.length !== 11) return;
            if (tipo === 'CNPJ' && docLimpo.length !== 14) return;

            buscando.classList.remove('hidden');
            try {
                const resposta = await fetch(LINK_API, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ acao: 'BUSCAR_CLIENTE', documentoLimpo: docLimpo })
                }).then(r => r.json());

                if (resposta.success && resposta.encontrado && resposta.cliente) {
                    const d = resposta.cliente;
                    document.getElementById('nome_razao').value = d.cliente || "";
                    document.getElementById('whatsapp').value = d.whatsapp || "";
                    document.getElementById('email').value = d.email || "";
                }
            } catch(e) {
                console.warn("Nao foi possivel buscar cliente pelo documento:", e);
            } finally {
                buscando.classList.add('hidden');
            }
        };

        const setStatusStep = (textoInicial, textoSecundario, cor, delayMs = 2000) => {
            const label = document.getElementById('status-data');
            if(window.statusTimeout) clearTimeout(window.statusTimeout);
            
            label.innerText = textoInicial;
            label.style.color = cor;

                    statusAgenda: statusAgendaGrupo,
                    concorrentes: concorrentesGrupo,
                    ehEventoPrincipal: true,
                    ehSubevento: false,
                    subeventosIds: subRefs.map((ref) => ref.id),
                    apresentacoesGrupo
                });

                subRefs.forEach((ref, index) => {
                    const apresentacao = apresentacoes[index + 1];
                    batch.set(ref, {
                        ...base,
                        dataStr: apresentacao.dataStr,
                        horaInicio: apresentacao.horaInicio,
                        duracao: apresentacao.duracao,
                        horaTermino: apresentacao.horaTermino,
                        statusAgenda: apresentacao.statusAgenda,
                        concorrentes: apresentacao.concorrentes,
                        origem: "form_orcamento_publico_subevento",
                        ehEventoPrincipal: false,
                        ehSubevento: true,
                        subeventoOrdem: apresentacao.ordem,
                        pedidoPrincipalFinanceiroId: principalRef.id,
                        financeiroNoPrincipal: true
                    });
                });

                await batch.commit();
                document.getElementById('formCliente').classList.add('hidden');
                document.getElementById('sucesso-cliente').classList.remove('hidden');
            } catch (err) {
                Swal.fire("Erro", err?.message || "Falha ao enviar a solicitacao.", "error");
            } finally {
                document.getElementById('btn-spinner').classList.add('hidden');
            }
        };

        setTimeout(() => {
            window.atualizarVisibilidadeApresentacoesMultiplas();
            window.obterBlocosApresentacaoFormulario().forEach((bloco) => window.definirStatusInicialApresentacao(bloco.statusEl, bloco.indice));
        }, 120);
    </script>
</body>
</html>
